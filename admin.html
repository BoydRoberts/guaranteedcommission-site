<!DOCTYPE html>
<!-- Build: 2026-03-20 (Admin Dashboard v1 - Auth-gated, multi-tab, photo preview, delete) -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | GuaranteedCommission.com</title><link rel="icon" type="image/png" href="/Logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active { color: #1d4ed8; border-bottom: 3px solid #1d4ed8; font-weight: 700; }
    .tab-inactive { color: #6b7280; border-bottom: 3px solid transparent; }
    .tab-inactive:hover { color: #374151; border-bottom-color: #d1d5db; }
    .card-thumb { width: 80px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #e5e7eb; cursor: pointer; }
    .card-thumb:hover { box-shadow: 0 0 0 2px #4DA6FF; }
    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .status-active { background: #dcfce7; color: #166534; }
    .status-pending { background: #fef9c3; color: #854d0e; }
    .status-draft { background: #f3f4f6; color: #374151; }
    .status-other { background: #e0e7ff; color: #3730a3; }
    .status-pill { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 600; text-transform: capitalize; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900">

  <!-- Auth Gate Screen -->
  <div id="authGate" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
      <p class="mt-4 text-gray-500 text-sm">Verifying admin access…</p>
    </div>
  </div>

  <!-- Dashboard (hidden until auth passes) -->
  <div id="dashboard" class="hidden">

    <!-- Header -->
    <header class="bg-white shadow">
      <div class="max-w-7xl mx-auto px-4 pt-3 pb-4">
        <div class="text-center" id="headerTitleBlock">
          <div class="flex items-end justify-center gap-0 -translate-x-[8px] md:-translate-x-[6px]">
            <img src="/Logo.png" alt="GuaranteedCommission Logo" class="h-7 w-7 md:h-10 md:w-10 object-contain -mr-[2px] translate-y-0 md:-mr-[6px] md:-mb-1 md:translate-y-0">
            <h1 class="text-lg sm:text-xl md:text-3xl font-bold tracking-tight text-gray-900 relative z-10">GuaranteedCommission.com&trade;</h1>
          </div>
          <p class="text-sm text-red-600 font-semibold mt-1">Admin Dashboard</p>
          <div class="mt-1.5 text-[8px] font-semibold tracking-widest leading-none uppercase" style="color:#4DA6FF;">Boyd Roberts | California Real Estate Broker | DRE #01354788</div>
        </div>
      </div>
    </header>

    <!-- Nav -->
    <nav class="bg-white border-b">
      <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
        <div class="flex gap-1 overflow-x-auto" id="tabBar">
          <button class="tab-btn tab-active px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="listings">Listings</button>
          <button class="tab-btn tab-inactive px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="localPros">Local Pros</button>
          <button class="tab-btn tab-inactive px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="localBrokers">Local Brokers</button>
          <button class="tab-btn tab-inactive px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="localServiceProviders">Service Providers</button>
          <button class="tab-btn tab-inactive px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="blacklist">Blacklist</button>
          <button class="tab-btn tab-inactive px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="reportedListings">Reports</button>
          <button class="tab-btn tab-inactive px-3 py-3 text-sm whitespace-nowrap transition-all" data-tab="supportTickets">Support</button>
        </div>
        <button id="logoutBtn" class="text-xs text-red-600 hover:underline ml-4 whitespace-nowrap">Log Out</button>
      </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      <div id="statsBar" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-4 text-center">
          <div id="statListings" class="text-2xl font-bold text-gray-800">-</div>
          <div class="text-xs text-gray-500 mt-1">Listings</div>
        </div>
        <div class="bg-white rounded-lg shadow p-4 text-center">
          <div id="statPros" class="text-2xl font-bold text-gray-800">-</div>
          <div class="text-xs text-gray-500 mt-1">Local Pros</div>
        </div>
        <div class="bg-white rounded-lg shadow p-4 text-center">
          <div id="statBrokers" class="text-2xl font-bold text-gray-800">-</div>
          <div class="text-xs text-gray-500 mt-1">Local Brokers</div>
        </div>
        <div class="bg-white rounded-lg shadow p-4 text-center">
          <div id="statServices" class="text-2xl font-bold text-gray-800">-</div>
          <div class="text-xs text-gray-500 mt-1">Service Providers</div>
        </div>
      </div>

      <div id="tableContainer" class="bg-white rounded-lg shadow overflow-hidden">
        <div id="tableLoading" class="p-8 text-center text-gray-400">Loading…</div>
        <div id="tableContent" class="overflow-x-auto hidden"></div>
        <div id="tableEmpty" class="p-8 text-center text-gray-400 hidden">No records found.</div>
      </div>
    </main>
  </div>

  <!-- Lightbox for photo preview -->
  <div id="lightbox" onclick="this.classList.remove('open')">
    <img id="lightboxImg" src="" alt="Preview">
  </div>

  <!-- Firebase + Dashboard Logic -->
  <script type="module">
    import { db } from "/scripts/firebase-init.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection, query, orderBy, getDocs, deleteDoc, doc, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const ADMIN_EMAIL = "boyd@lagunagalleryrealestate.com";
    const auth = getAuth();

    // ========== AUTH GATE ==========
    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== ADMIN_EMAIL) {
        window.location.href = "/index.html";
        return;
      }
      // Admin verified
      document.getElementById("authGate").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      loadTab("listings");
      loadStats();
    });

    // Logout
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await signOut(auth);
      localStorage.removeItem("loggedInEmail");
      window.location.href = "/index.html";
    });

    // ========== TAB SWITCHING ==========
    let currentTab = "listings";
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        if (tab === currentTab) return;
        currentTab = tab;

        document.querySelectorAll(".tab-btn").forEach(b => {
          b.classList.remove("tab-active");
          b.classList.add("tab-inactive");
        });
        btn.classList.remove("tab-inactive");
        btn.classList.add("tab-active");

        loadTab(tab);
      });
    });

    // ========== STATS ==========
    async function loadStats() {
      try {
        const counts = {
          listings: 0, localPros: 0, localBrokers: 0, localServiceProviders: 0
        };
        for (const col of Object.keys(counts)) {
          const snap = await getDocs(query(collection(db, col), limit(500)));
          counts[col] = snap.size;
        }
        document.getElementById("statListings").textContent = counts.listings;
        document.getElementById("statPros").textContent = counts.localPros;
        document.getElementById("statBrokers").textContent = counts.localBrokers;
        document.getElementById("statServices").textContent = counts.localServiceProviders;
      } catch (e) {
        console.warn("[admin] stats failed:", e);
      }
    }

    // ========== COLUMN DEFINITIONS PER TAB ==========
    const COLUMNS = {
      listings: [
        { key: "createdAt", label: "Date", fmt: fmtDate },
        { key: "address", label: "Address" },
        { key: "ownerName", label: "Owner" },
        { key: "agentName", label: "Agent" },
        { key: "agentEmail", label: "Agent Email" },
        { key: "agentPhone", label: "Agent Phone" },
        { key: "plan", label: "Plan" },
        { key: "status", label: "Status", fmt: fmtStatus },
        { key: "commission", label: "Comm.", fmt: (v, row) => {
          if (!v && v !== 0) return "-";
          return (row.commissionType === "$" ? "$" + Number(v).toLocaleString() : v + "%");
        }}
      ],
      localPros: [
        { key: "createdAt", label: "Date", fmt: fmtDate },
        { key: "personalName", label: "Name" },
        { key: "name", label: "Company" },
        { key: "email", label: "Email" },
        { key: "phone", label: "Phone" },
        { key: "role", label: "Role" },
        { key: "license", label: "License" },
        { key: "zips", label: "ZIPs", fmt: (v) => Array.isArray(v) ? v.join(", ") : (v || "-") },
        { key: "status", label: "Status", fmt: fmtStatus },
        { key: "photoUrl", label: "Card", fmt: fmtPhoto }
      ],
      localBrokers: [
        { key: "createdAt", label: "Date", fmt: fmtDate },
        { key: "name", label: "Brokerage" },
        { key: "contact", label: "Contact" },
        { key: "email", label: "Email" },
        { key: "phone", label: "Phone" },
        { key: "license", label: "License" },
        { key: "zips", label: "ZIPs", fmt: (v) => Array.isArray(v) ? v.join(", ") : (v || "-") },
        { key: "status", label: "Status", fmt: fmtStatus },
        { key: "photoUrl", label: "Ad", fmt: fmtPhoto }
      ],
      localServiceProviders: [
        { key: "createdAt", label: "Date", fmt: fmtDate },
        { key: "name", label: "Name" },
        { key: "company", label: "Company" },
        { key: "email", label: "Email" },
        { key: "phone", label: "Phone" },
        { key: "role", label: "Service Type" },
        { key: "zips", label: "ZIPs", fmt: (v) => Array.isArray(v) ? v.join(", ") : (v || "-") },
        { key: "status", label: "Status", fmt: fmtStatus },
        { key: "photoUrl", label: "Card", fmt: fmtPhoto }
      ],
      blacklist: [
        { key: "email", label: "Email" },
        { key: "phone", label: "Phone" },
        { key: "note", label: "Note" }
      ],
      reportedListings: [
        { key: "createdAt", label: "Date", fmt: fmtDate },
        { key: "listingId", label: "Listing ID" },
        { key: "address", label: "Address" },
        { key: "reason", label: "Reason" },
        { key: "reporterEmail", label: "Reporter" }
      ],
      supportTickets: [
        { key: "createdAt", label: "Date", fmt: fmtDate },
        { key: "name", label: "Name" },
        { key: "email", label: "Email" },
        { key: "phone", label: "Phone" },
        { key: "address", label: "Address" },
        { key: "message", label: "Message" },
        { key: "status", label: "Status", fmt: fmtStatus }
      ]
    };

    // ========== FORMATTERS ==========
    function fmtDate(v) {
      if (!v) return "-";
      try {
        const d = typeof v.toDate === "function" ? v.toDate() : new Date(v);
        return (d.getMonth() + 1) + "/" + d.getDate() + "/" + d.getFullYear();
      } catch { return "-"; }
    }

    function fmtStatus(v) {
      const s = String(v || "unknown").toLowerCase();
      let cls = "status-other";
      if (s === "active") cls = "status-active";
      else if (s === "pending") cls = "status-pending";
      else if (s === "draft") cls = "status-draft";
      return `<span class="status-pill ${cls}">${s}</span>`;
    }

    function fmtPhoto(v) {
      if (!v) return "-";
      return `<img src="${v}" class="card-thumb" onclick="document.getElementById('lightboxImg').src='${v}'; document.getElementById('lightbox').classList.add('open');" alt="Card">`;
    }

    // ========== LOAD TAB ==========
    async function loadTab(tabName) {
      const loading = document.getElementById("tableLoading");
      const content = document.getElementById("tableContent");
      const empty = document.getElementById("tableEmpty");

      loading.classList.remove("hidden");
      content.classList.add("hidden");
      empty.classList.add("hidden");

      try {
        const cols = COLUMNS[tabName] || [];
        let q;
        // blacklist has no createdAt typically
        if (tabName === "blacklist") {
          q = query(collection(db, tabName));
        } else {
          q = query(collection(db, tabName), orderBy("createdAt", "desc"), limit(200));
        }

        const snap = await getDocs(q);

        if (snap.empty) {
          loading.classList.add("hidden");
          empty.classList.remove("hidden");
          return;
        }

        // Build table
        let html = '<table class="w-full text-sm"><thead class="bg-gray-50 text-left"><tr>';
        for (const col of cols) {
          html += `<th class="px-3 py-2 font-semibold text-gray-600 text-xs uppercase tracking-wide whitespace-nowrap">${col.label}</th>`;
        }
        html += '<th class="px-3 py-2 font-semibold text-gray-600 text-xs uppercase tracking-wide">Actions</th>';
        html += '</tr></thead><tbody>';

        snap.forEach((docSnap) => {
          const data = docSnap.data();
          const docId = docSnap.id;

          html += `<tr class="border-t hover:bg-gray-50" id="row-${docId}">`;
          for (const col of cols) {
            const raw = data[col.key];
            const display = col.fmt ? col.fmt(raw, data) : (raw != null ? String(raw) : "-");
            html += `<td class="px-3 py-2 max-w-[200px] truncate">${display}</td>`;
          }
          html += `<td class="px-3 py-2 whitespace-nowrap">
            <button class="text-xs text-red-600 hover:text-red-800 font-semibold delete-btn" data-collection="${tabName}" data-id="${docId}">Delete</button>
          </td>`;
          html += '</tr>';
        });

        html += '</tbody></table>';

        content.innerHTML = html;
        loading.classList.add("hidden");
        content.classList.remove("hidden");

        // Wire delete buttons
        content.querySelectorAll(".delete-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const coll = btn.dataset.collection;
            const id = btn.dataset.id;
            if (!confirm(`Are you sure you want to delete this ${coll} record?\n\nDocument ID: ${id}`)) return;

            try {
              await deleteDoc(doc(db, coll, id));
              const row = document.getElementById("row-" + id);
              if (row) row.remove();
              console.log("[admin] Deleted:", coll, id);
              // Refresh stats
              loadStats();
            } catch (e) {
              alert("Delete failed: " + e.message);
              console.error("[admin] Delete failed:", e);
            }
          });
        });

      } catch (e) {
        console.error("[admin] Load tab failed:", e);
        loading.classList.add("hidden");
        empty.textContent = "Error loading data: " + e.message;
        empty.classList.remove("hidden");
      }
    }
  </script>

</body>
</html>
